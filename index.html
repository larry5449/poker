<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Poker Trainer</title>

<style>
body {
    background: #111;
    color: white;
    font-family: monospace;
    text-align: center;
    margin-top: 100px;
}

#position {
    font-size: 30px;
    color: #aaa;
}

#hand {
    font-size: 70px;
    margin: 20px;
}

button {
    font-size: 40px;
    padding: 20px 60px;
    margin: 20px;
    border-radius: 10px;
    border: none;
}

#result {
    font-size: 50px;
    margin-top: 20px;
}

#timerBarContainer {
    width: 300px;
    height: 10px;
    margin: 20px auto;

    background: #333;
    border-radius: 5px;
    overflow: hidden;
}

#timerBar {
    height: 100%;
    width: 100%;

    background: linear-gradient(to right, #00ffcc, #00ccff);

    transition: width 5s linear;
}

#btn_pause {
    position: fixed;
    top: 20px;
    right: 20px;

    width: 50px;
    aspect-ratio: 1;

    padding: 0;

    font-size: 22px;

    background: #222;
    color: white;

    border-radius: 50%;
    border: 1px solid #555;

    display: flex;
    align-items: center;
    justify-content: center;
}



#btn_pause:hover {
    background: #444;
}

#btn_pause:active {
    transform: scale(0.9);
}


#topLeftBar {
    position: fixed;

    top: 20px;
    left: 20px;

    display: flex;
    align-items: center;
    gap: 10px;   /* ✅ 按鈕和版本間距 */
}

/* reset 按鈕 */
#btn_reset {
    width: 36px;
    aspect-ratio: 1;

    border-radius: 50%;
    border: 1px solid #555;

    background: #222;
    color: #aaa;

    font-size: 18px;

    display: flex;
    align-items: center;
    justify-content: center;

    padding: 0;
}

#btn_reset:hover {
    background: #444;
    color: white;
}

/* ✅ 版本號 */
#version {
    color: white;
    font-size: 14px;
    opacity: 0.8;
}

</style>

</head>

<body>

<div id="topLeftBar">
    <button id="btn_reset">↺</button>
    <div id="version">v0.1</div>
</div>

<!-- ✅ 模式選單 -->
<select id="mode">
  <option value="open">Open Raise</option>
  <option value="vsOpen">Facing Open</option>
  <option value="vs3bet">Facing 3-Bet</option>
</select>

<!-- ✅ 顯示資訊 -->
<div id="position"></div>
<div id="hand"></div>
<div id="timerBarContainer">
  <div id="timerBar"></div>
</div>

<!-- ✅ 按鈕 -->
<button id="btn_raise" style="background:green;color:white;">Raise</button>
<button id="btn_call" style="background:blue;color:white;">Call</button>
<button id="btn_fold" style="background:red;color:white;">Fold</button>
<button id="btn_pause" style="background:rgb(229, 245, 4);color:white;">| |</button>
<button id="btn_reset">Reset Stats</button>

<!-- ✅ 結果 -->
<div id="result"></div>


<!-- 每次發版記得改版本號(還沒寫顯示版本號) -->
<script type="module" src="./js/main.js?v=0.2"></script>


</body>
</html>
