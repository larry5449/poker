<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    background: #111;
    color: white;
    font-family: monospace;
    text-align: center;
    margin-top: 100px;
}

#pos {
    font-size: 30px;
    color: #aaa;
}

#hand {
    font-size: 70px;
    margin: 20px;
}

button {
    font-size: 40px;
    padding: 20px 60px;
    margin: 20px;
    border-radius: 10px;
    border: none;
}

#result {
    font-size: 50px;
    margin-top: 20px;
}
</style>
</head>

<body>

<div id="pos"></div>
<div id="hand"></div>

<button onclick="answer(true)" style="background:green;color:white;">Open</button>
<button onclick="answer(false)" style="background:red;color:white;">Fold</button>

<div id="result"></div>
<div id="debug"></div>
<script>

const ranges = {

UTG: {
"AA":1,"AKs":1,"AQs":1,"AJs":1,"ATs":1,"A9s":1,"A8s":1,"A7s":1,"A6s":1,"A5s":1,"A4s":1,
"AKo":1,"KK":1,"KQs":1,"KJs":1,"KTs":1,
"AQo":1,"KQo":1,"QQ":1,"QJs":1,"QTs":1,
"JJ":1,"JTs":1,
"TT":1,"99":1,"88":1,"77":1,"66":1,"55":1,"44":1,"33":1,"22":1
},

HJ: {
"AA":1,"AKs":1,"AQs":1,"AJs":1,"ATs":1,"A9s":1,"A8s":1,"A7s":1,"A6s":1,"A5s":1,"A4s":1,"A3s":1,"A2s":1,
"AKo":1,"KK":1,"KQs":1,"KJs":1,"KTs":1,"K9s":1,"K8s":1,
"AQo":1,"KQo":1,"QQ":1,"QJs":1,"QTs":1,
"AJo":1,"KJo":1,"QJo":1,"JJ":1,"JTs":1,
"TT":1,"99":1,"88":1,"77":1
},

CO: {
"AA":1,"AKs":1,"AQs":1,"AJs":1,"ATs":1,"A9s":1,"A8s":1,"A7s":1,"A6s":1,"A5s":1,"A4s":1,"A3s":1,"A2s":1,
"AKo":1,"KK":1,"KQs":1,"KJs":1,"KTs":1,"K9s":1,
"AQo":1,"KQo":1,"QQ":1,"QJs":1,"QTs":1,"Q9s":1,
"AJo":1,"KJo":1,"QJo":1,"JJ":1,"JTs":1,"J9s":1,
"ATo":1,"KTo":1,"QTo":1,"JTo":1,"TT":1,"T9s":1,
"99":1,"98s":1,"88":1,"77":1,"66":1
},

BTN: {
"AA":1,"AKs":1,"AQs":1,"AJs":1,"ATs":1,"A9s":1,"A8s":1,"A7s":1,"A6s":1,"A5s":1,"A4s":1,"A3s":1,"A2s":1,
"AKo":1,"KK":1,"KQs":1,"KJs":1,"KTs":1,"K9s":1,"K8s":1,"K7s":1,"K6s":1,"K5s":1,"K4s":1,
"AQo":1,"KQo":1,"QQ":1,"QJs":1,"QTs":1,"Q9s":1,"Q8s":1,"Q7s":1,"Q6s":1,"Q5s":1,"Q4s":1,
"AJo":1,"KJo":1,"QJo":1,"JJ":1,"JTs":1,"J9s":1,"J8s":1,"J7s":1,"J6s":1,"J5s":1,"J4s":1,
"ATo":1,"KTo":1,"QTo":1,"JTo":1,"TT":1,"T9s":1,"T8s":1,
"A9o":1,"K9o":1,"Q9o":1,"J9o":1,"T9o":1,"99":1,"98s":1,
"A8o":1,"88":1,"87s":1,
"A7o":1,"77":1,
"A6o":1,"66":1,
"A5o":1,"55":1,
"A4o":1,"44":1,
"A3o":1,"33":1,
"A2o":1,"22":1
},

SB: {
"AA":1,"AKs":1,"AQs":1,"AJs":1,"ATs":1,"A9s":1,"A8s":1,"A7s":1,"A6s":1,"A5s":1,"A4s":1,"A3s":1,"A2s":1,
"AKo":1,"KK":1,"KQs":1,"KJs":1,"KTs":1,"K9s":1,"K8s":1,"K7s":1,
"AQo":1,"KQo":1,"QQ":1,"QJs":1,"QTs":1,"Q9s":1,"Q8s":1,"Q7s":1,
"AJo":1,"KJo":1,"QJo":1,"JJ":1,"JTs":1,"J9s":1,"J8s":1,"J7s":1,
"ATo":1,"KTo":1,"QTo":1,"JTo":1,"TT":1,"T9s":1,
"A9o":1,"99":1,
"A8o":1,"88":1,
"A7o":1,"77":1,
"A6o":1,"66":1,
"A5o":1,"55":1,
"A4o":1,"44":1,
"A3o":1,"33":1,
"A2o":1,"22":1
}

};

const ranks = ["A","K","Q","J","T","9","8","7","6","5","4","3","2"];

let current = {};
let wrongCount = {};

function getWeightedHands(pos) {
    let output = [];

    for (let hand in ranges[pos]) {

        let base = 1;

        let key = pos + "_" + hand;

        // ✅ 答錯越多 → 權重越高
        let bonus = wrongCount[key] || 0;

        let weight = base + bonus * 3;

        console.log(pos, hand, "weight =", weight);

        for (let i = 0; i < weight; i++) {
            output.push(hand);
        }
    }

    return output;
}

function randomHand() {
    let i = Math.floor(Math.random()*13);
    let j = Math.floor(Math.random()*13);

    if(i === j) return ranks[i]+ranks[j];
    if(i < j) return ranks[i]+ranks[j]+"s";
    return ranks[j]+ranks[i]+"o";
}





function answer(a) {
    if (!current.hand) return;

    let user = a ? 1 : 0;

    let key = current.pos + "_" + current.hand;

    if(user === current.correct){
        document.getElementById("result").innerText = "Correct!";
        wrongCount[key] = 0;
    } else {
        document.getElementById("result").innerText =
        current.hand + (current.correct ? " should open" : " should fold");

        // ✅ 錯就+1
        wrongCount[key] = (wrongCount[key] || 0) + 1;
    }

    setTimeout(newQ, 700);
}

function newQ() {
    let posList = Object.keys(ranges);
    let pos = posList[Math.floor(Math.random()*posList.length)];

    let hand;

    // ✅ 50% 用加權（開）
    if (Math.random() < 0.5) {
        let handPool = getWeightedHands(pos);
        hand = handPool[Math.floor(Math.random()*handPool.length)];
    } 
    // ✅ 50% 隨機（可能不開）
    else {
        hand = randomHand();
    }

    let correct = ranges[pos][hand] ? 1 : 0;

    current = {pos, hand, correct};

    document.getElementById("pos").innerText = pos;
    document.getElementById("hand").innerText = hand;
    document.getElementById("result").innerText = "";
  }


newQ()
</script>

</body>
</html>
