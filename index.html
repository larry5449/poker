<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Poker Trainer</title>

<style>
body {
    background: #111;
    color: white;
    font-family: monospace;
    text-align: center;
    margin-top: 100px;
}

#position {
    font-size: 30px;
    color: #aaa;
}

#hand {
    font-size: 70px;
    margin: 20px;
}

button {
    font-size: 40px;
    padding: 20px 60px;
    margin: 20px;
    border-radius: 10px;
    border: none;
}

#result {
    font-size: 50px;
    margin-top: 20px;
}
</style>

</head>

<body>

<!-- ✅ 模式選單 -->
<select id="mode">
  <option value="open">Open Raise</option>
  <option value="vsOpen">Facing Open</option>
  <option value="vs3bet">Facing 3-Bet</option>
</select>

<!-- ✅ 顯示資訊 -->
<div id="position"></div>
<div id="hand"></div>

<!-- ✅ 按鈕 -->
<button id="btn_raise" style="background:green;color:white;">Raise</button>
<button id="btn_call" style="background:blue;color:white;">Call</button>
<button id="btn_fold" style="background:red;color:white;">Fold</button>

<!-- ✅ 結果 -->
<div id="result"></div>

<!-- ✅ 關鍵！！模組入口 -->
<script type="module" src="./js/main.js"></script>

</body>
</html>
